<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Obseri Pulse identity preview</title>
  <desc id="desc">Seven-loop woven light and dark logo lockups with favicon scale proofs.</desc>
  <defs>
    <symbol id="pulse" viewBox="0 0 128 128">
      <defs>
        <ellipse id="preview-pulse-loop" cx="64" cy="34" rx="14" ry="27"/>
        <mask id="preview-woven-pulse" maskUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
          <rect width="128" height="128" fill="black"/>
          <g fill="none" stroke-linecap="round" stroke-linejoin="round">
            <use href="#preview-pulse-loop" stroke="white" stroke-width="7"/>
            <g transform="rotate(51.4286 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
            <g transform="rotate(102.8571 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
            <g transform="rotate(154.2857 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
            <g transform="rotate(205.7143 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
            <g transform="rotate(257.1429 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
            <g transform="rotate(308.5714 64 64)"><use href="#preview-pulse-loop" stroke="black" stroke-width="13"/><use href="#preview-pulse-loop" stroke="white" stroke-width="7"/></g>
          </g>
        </mask>
      </defs>
      <rect width="128" height="128" fill="currentColor" mask="url(#preview-woven-pulse)"/>
    </symbol>
  </defs>

  <rect width="800" height="900" fill="#0b0b0d"/>
  <rect x="800" width="800" height="900" fill="#f7f5f2"/>

  <g transform="translate(117 280)">
    <use href="#pulse" width="128" height="128" color="#ff5c7a"/>
    <text
      x="162"
      y="91"
      fill="#f7f5f2"
      font-family="Avenir Next, Inter, Segoe UI, Arial, sans-serif"
      font-size="80"
      font-weight="400"
      letter-spacing="1"
      textLength="223"
      lengthAdjust="spacingAndGlyphs"
    >obser</text>
    <rect x="375" y="51" width="8" height="40" rx="4" fill="#f7f5f2"/>
    <circle cx="379" cy="34" r="6" fill="#ff5c7a"/>
  </g>

  <g transform="translate(917 280)">
    <use href="#pulse" width="128" height="128" color="#ff5c7a"/>
    <text
      x="162"
      y="91"
      fill="#151518"
      font-family="Avenir Next, Inter, Segoe UI, Arial, sans-serif"
      font-size="80"
      font-weight="400"
      letter-spacing="1"
      textLength="223"
      lengthAdjust="spacingAndGlyphs"
    >obser</text>
    <rect x="375" y="51" width="8" height="40" rx="4" fill="#151518"/>
    <circle cx="379" cy="34" r="6" fill="#ff5c7a"/>
  </g>

  <g transform="translate(238 590)">
    <rect width="324" height="164" rx="38" fill="#151518" stroke="#26262a" stroke-width="2"/>
    <use href="#pulse" x="42" y="18" width="128" height="128" color="#ff5c7a"/>
    <use href="#pulse" x="208" y="50" width="64" height="64" color="#f7f5f2"/>
  </g>

