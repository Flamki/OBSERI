<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 128" role="img" aria-labelledby="title desc">
  <title id="title">Obseri</title>
  <desc id="desc">Obseri woven pulse mark and wordmark.</desc>
  <defs>
    <ellipse id="logo-pulse-loop" cx="64" cy="34" rx="14" ry="27"/>
    <mask id="logo-woven-pulse" maskUnits="userSpaceOnUse" x="0" y="0" width="128" height="128">
      <rect width="128" height="128" fill="black"/>
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <use href="#logo-pulse-loop" stroke="white" stroke-width="7"/>
        <g transform="rotate(51.4286 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
        <g transform="rotate(102.8571 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
        <g transform="rotate(154.2857 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
        <g transform="rotate(205.7143 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
        <g transform="rotate(257.1429 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
        <g transform="rotate(308.5714 64 64)"><use href="#logo-pulse-loop" stroke="black" stroke-width="13"/><use href="#logo-pulse-loop" stroke="white" stroke-width="7"/></g>
      </g>
    </mask>
