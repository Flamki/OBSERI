  <rect width="128" height="128" fill="#ff5c7a" mask="url(#logo-woven-pulse)"/>
  <text x="152" y="91" fill="#151518" font-family="Avenir Next, Inter, Segoe UI, Arial, sans-serif" font-size="80" font-weight="400" letter-spacing="1" textLength="223" lengthAdjust="spacingAndGlyphs">obser</text>
  <rect x="365" y="51" width="8" height="40" rx="4" fill="#151518"/>
  <circle cx="369" cy="34" r="6" fill="#ff5c7a"/>
